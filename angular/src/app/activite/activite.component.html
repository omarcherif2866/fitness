<app-navbar></app-navbar>

<section class="courses-section">
  <div class="container">

    <div class="section-header">
      <h2>Nos Cours</h2>
      <span>{{ courss.length }} formations disponibles</span>
    </div>

    <div class="courses-grid">
      <div *ngFor="let cours of courss" class="course-card">

        <div class="card-img-wrap">
          <img [src]="cours.image" [alt]="cours.nom" />
          <div class="card-img-overlay"></div>
          <!-- <span class="card-badge">{{ cours.categorie }}</span> -->
        </div>

        <div class="card-body">
          <h3 class="card-title">{{ cours.nom }}</h3>
          <div class="card-meta">
            <!-- <span class="card-cat">{{ cours.type }}</span> -->
            <span class="card-dot"></span>
            <!-- <span class="card-date">{{ cours.date | date: 'dd/MM/yyyy' }}</span> -->
          </div>
          <div class="card-footer">
            <button class="btn-reserve" (click)="reserve(cours.id)">Réserver</button>
            <span class="arrow-icon">→</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>

<app-footer></app-footer>
