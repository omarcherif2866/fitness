<app-navbar></app-navbar>

<section class="planning-section">
  <div class="wrap">
    <div class="top">
      <h2>Planning Semaine</h2>
      <span>Cliquez pour réserver</span>
    </div>

    <div class="planning-grid">
      <div class="day" *ngFor="let jour of jours">
        <div class="day-head" [class.today]="jour === jourActuel">{{ jour }}</div>
        <div class="day-body">
          <div class="slot" *ngFor="let cours of coursParJour[jour]"
               [class]="'slot ' + getColorClass(cours)"
               (click)="reserveCours(cours, jour)">
            <div class="slot-top">
              <div class="slot-img" [style.backgroundImage]="'url(' + cours.image + ')'"></div>
              <span class="slot-nom">{{ cours.nom }}</span>
            </div>
            <span class="slot-heure">{{ cours.heures.join(' · ') }}</span>
          </div>
          <div class="empty" *ngIf="!coursParJour[jour]?.length">—</div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
