<app-navbar></app-navbar>

<section class="planning-section">
  <div class="wrap">
    <div class="top">
      <h2>Planning Coachs</h2>
      <span>Cliquez pour réserver</span>
    </div>

    <div class="planning-grid">
      <div class="day" *ngFor="let jour of jours">
        <div class="day-head" [class.today]="jour === jourActuel">{{ jour }}</div>
        <div class="day-body">
          <div class="slot"
               *ngFor="let coach of coachParJour[jour]"
               [class]="'slot ' + getColorClass(coach)"
               [class.disabled]="!isLoggedIn"
               (click)="reserveCoach(coach, jour)">
            <div class="slot-top">
              <div class="slot-img" [style.backgroundImage]="'url(' + coach.image + ')'"></div>
              <span class="slot-nom">{{ coach.nom }}</span>
            </div>
            <span class="slot-heure">{{ coach.heures.join(' · ') }}</span>
          </div>
          <div class="empty" *ngIf="!coachParJour[jour]?.length">—</div>
        </div>
      </div>
    </div>

  </div>
</section>

<app-footer></app-footer>
